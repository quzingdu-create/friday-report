<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周五放榜 服饰行业本周消耗榜单</title>
<style>
  :root {
    --primary: #e63946;
    --primary-light: #ff6b6b;
    --secondary: #1d3557;
    --accent: #f4a261;
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --success: #10b981;
    --warning: #f59e0b;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,.10);
    --radius: 14px;
    --transition: .25s cubic-bezier(.4,0,.2,1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue","Noto Sans SC",sans-serif;
    background:var(--bg); color:var(--text);
    line-height:1.6; min-height:100vh;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg,#1d3557 0%,#457b9d 50%,#a8dadc 100%);
    color:#fff; padding:36px 20px 28px; text-align:center;
    position:relative; overflow:hidden;
  }
  .header::before{
    content:''; position:absolute; top:-60%; right:-20%;
    width:400px; height:400px; border-radius:50%;
    background:rgba(255,255,255,.04);
  }
  .header::after{
    content:''; position:absolute; bottom:-40%; left:-10%;
    width:300px; height:300px; border-radius:50%;
    background:rgba(255,255,255,.03);
  }
  .header h1{ font-size:26px; font-weight:800; letter-spacing:.5px; position:relative; z-index:1;}
  .header h1 .emoji{ font-size:30px; vertical-align:middle; margin-right:6px; }
  .header .subtitle{ font-size:14px; opacity:.82; margin-top:8px; font-weight:400; position:relative;z-index:1;}
  .header-meta{ display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:16px; position:relative;z-index:1;}

  /* ===== NAV BAR (Date + Category) ===== */
  .navbar {
    background:var(--card-bg); padding:12px 20px;
    display:flex; align-items:center; justify-content:center; gap:20px;
    box-shadow:var(--shadow-sm); position:sticky; top:0; z-index:100;
    flex-wrap:wrap;
  }

  /* Date Switcher */
  .date-switcher { display:flex; align-items:center; gap:8px; }
  .date-btn {
    width:34px; height:34px; border-radius:10px; border:none; cursor:pointer;
    background:var(--bg); color:var(--text-secondary); font-size:16px;
    display:flex; align-items:center; justify-content:center;
    transition:var(--transition); font-weight:600;
  }
  .date-btn:hover{ background:var(--border); color:var(--text); transform:scale(1.05);}
  .date-display{
    font-size:15px; font-weight:700; color:var(--secondary);
    min-width:120px; text-align:center; padding:4px 12px;
    background:linear-gradient(135deg,#eef2ff,#e0e7ff); border-radius:8px;
  }

  /* Category Tabs */
  .cat-tabs { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .cat-tab {
    padding:7px 18px; border-radius:20px; border:none; cursor:pointer;
    font-size:13.5px; font-weight:600; transition:var(--transition);
    background:var(--bg); color:var(--text-secondary); white-space:nowrap;
  }
  .cat-tab:hover{ background:#e8eaed; color:var(--text); }
  .cat-tab.active{
    background:linear-gradient(135deg,var(--primary),#ff6b6b); color:#fff;
    box-shadow:0 2px 8px rgba(230,57,70,.35);
  }

  /* ===== MAIN CONTENT ===== */
  .container{ max-width:920px; margin:0 auto; padding:20px; }

  /* Section */
  .section{ animation:fadeUp .4s ease-out both; }
  @keyframes fadeUp{ from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  /* Merchant Card */
  .m-card{
    background:var(--card-bg); border-radius:var(--radius);
    padding:16px 20px; margin-bottom:10px;
    box-shadow:var(--shadow-sm); border:1px solid rgba(0,0,0,.04);
    transition:all var(--transition); position:relative; overflow:hidden;
    display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
  }
  .m-card:hover{ box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .m-card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
    border-radius:4px 0 0 4px;
  }
  .m-card.r1::before{background:linear-gradient(#ffd700,#ffb300)}
  .m-card.r2::before{background:linear-gradient(#c0c0c0,#a0a0a0)}
  .m-card.r3::before{background:linear-gradient(#cd7f32,#b87333)}
  .m-card.rn::before{background:var(--border)}
  .m-card.growth::before{background:var(--success)}

  .m-info{ flex:1; min-width:0; }
  .m-name{ font-size:15px; font-weight:650; color:var(--text); line-height:1.4; }
  .m-name .medal{ font-size:18px; margin-right:4px; vertical-align:-2px; }
  .m-gmv{
    display:inline-flex; align-items:center; gap:3px;
    padding:4px 12px; border-radius:8px; font-size:13.5px; font-weight:700;
    white-space:nowrap; flex-shrink:0;
    background:linear-gradient(135deg,#fff7ed,#fed7aa); color:#c2410c; border:1px solid rgba(245,158,11,.25);
  }
  .m-gmv.g-style{ background:linear-gradient(135deg,#ecfdf5,#d1fae5); color:#047857; border-color:rgba(16,185,129,.25)}
  .m-cats{ margin-top:6px; font-size:13px; color:var(--text-secondary); }
  .m-cats .tag{ display:inline-block; padding:2px 8px; margin:2px 4px 2px 0; border-radius:6px; background:#f3f4f6; color:#4b5563; font-size:12.5px; }
  .m-rate{
    display:inline-flex; align-items:center; gap:3px; margin-top:6px;
    padding:3px 10px; border-radius:8px; font-size:13px; font-weight:650;
    background:linear-gradient(135deg,#ecfdf5,#d1fae5); color:#047857;
    border:1px solid rgba(16,185,129,.2);
  }

  /* Subsection Title */
  .sub-title{
    display:flex; align-items:center; gap:8px;
    padding:14px 4px 8px; font-size:14px; font-weight:700; color:var(--text-secondary);
  }
  .sub-title svg{ stroke:var(--accent); flex-shrink:0; }

  /* Empty State */
  .empty-state{
    text-align:center; padding:48px 20px; color:var(--text-secondary);
  }
  .empty-state .icon{ font-size:48px; margin-bottom:12px; }
  .empty-state p{ font-size:14px; }

  /* ===== FOOTER STATS ===== */
  .footer-stats{
    max-width:920px; margin:24px auto 0; padding:20px;
    background:var(--card-bg); border-radius:var(--radius);
    display:flex; justify-content:space-around; flex-wrap:wrap; gap:16px;
    box-shadow:var(--shadow-sm);
  }
  .stat-item{ text-align:center; }
  .stat-num{ font-size:24px; font-weight:800; color:var(--primary); }
  .stat-label{ font-size:12px; color:var(--text-secondary); margin-top:2px; }

  .footer-note{ text-align:center; padding:20px; color:var(--text-secondary); font-size:12.5px; }

  /* ===== FEEDBACK BUTTON ===== */
  .feedback-fab{
    position:fixed; right:24px; bottom:24px; z-index:200;
    width:52px; height:52px; border-radius:50%; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--primary),#ff6b6b); color:#fff;
    font-size:22px; box-shadow:0 4px 16px rgba(230,57,70,.4);
    transition:var(--transition); display:flex; align-items:center; justify-content:center;
  }
  .feedback-fab:hover{ transform:scale(1.1) rotate(-5deg); box-shadow:0 6px 24px rgba(230,57,70,.5);}

  /* Feedback Modal */
  .modal-overlay{
    position:fixed; inset:0; z-index:299;
    background:rgba(0,0,0,.45); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; visibility:hidden; transition:.3s ease;
  }
  .modal-overlay.show{ opacity:1; visibility:visible; }
  .modal-box{
    background:var(--card-bg); border-radius:18px;
    width:92%; max-width:480px; max-height:85vh; overflow-y:auto;
    padding:28px 24px; transform:scale(.9) translateY(20px);
    transition:.3s cubic-bezier(.175,.885,.32,1.275);
    box-shadow:0 20px 60px rgba(0,0,0,.2);
  }
  .modal-overlay.show .modal-box{ transform:scale(1) translateY(0); }
  .modal-title{ font-size:19px; font-weight:800; color:var(--text); margin-bottom:4px; }
  .modal-desc{ font-size:13.5px; color:var(--text-secondary); margin-bottom:18px; }
  .form-group{ margin-bottom:14px; }
  .form-group label{ display:block; font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; }
  .form-group input, .form-group textarea, .form-group select{
    width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:10px;
    font-size:14px; font-family:inherit; outline:none; transition:var(--transition);
    background:#fafbfc;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus{
    border-color:var(--primary); box-shadow:0 0 0 3px rgba(230,57,70,.12);
  }
  .form-group textarea{ resize:vertical; min-height:90px; }
  .btn-primary{
    width:100%; padding:12px; border:none; border-radius:10px; cursor:pointer;
    font-size:15px; font-weight:700; color:#fff;
    background:linear-gradient(135deg,var(--primary),#ff6b6b);
    transition:var(--transition); margin-top:6px;
  }
  .btn-primary:hover{ transform:translateY(-1px); box-shadow:0 4px 12px rgba(230,57,70,.35)}
  .btn-cancel{
    width:100%; padding:10px; border:none; border-radius:10px; cursor:pointer;
    font-size:14px; font-weight:600; color:var(--text-secondary);
    background:var(--bg); margin-top:8px; transition:var(--transition);
  }
  .btn-cancel:hover{ background:var(--border); }
  .toast{
    position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px);
    background:var(--success); color:#fff; padding:10px 24px; border-radius:10px;
    font-size:14px; font-weight:600; z-index:500;
    box-shadow:0 4px 16px rgba(16,185,129,.35);
    transition:.4s cubic-bezier(.175,.885,.32,1.275);
  }
  .toast.show{ transform:translateX(-50%) translateY(0); }

  /* Visit Counter Badge */
  .visit-badge{
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 12px; border-radius:20px; font-size:12.5px; font-weight:600;
    background:rgba(255,255,255,.15); backdrop-filter:blur(4px);
  }
  .visit-dot{ width:8px; height:8px; border-radius:50%; background:#4ade80; animation:pulse 2s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Responsive */
  @media(max-width:600px){
    .header h1{ font-size:21px; } .navbar{ padding:10px 12px; gap:12px; }
    .cat-tab{ padding:6px 13px; font-size:12.5px; }
    .m-card{ padding:13px 15px; } .container{ padding:12px; }
    .footer-stats{ margin-top:16px; padding:14px; }
    .feedback-fab{ right:16px; bottom:16px; width:46px; height:46px; font-size:20px; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <h1><span class="emoji">📊</span>周五放榜 <span style="color:#f4a261">服饰行业</span>本周消耗榜单</h1>
  <div class="subtitle">AData BI 数据 · 全类目头部视频号分析</div>
  <div class="header-meta">
    <span class="visit-badge"><span class="visit-dot"></span> 浏览量：<span id="visitCount">--</span> 次</span>
    <span class="visit-badge" id="lastUpdateBadge"></span>
  </div>
</div>

<!-- ===== NAV BAR ===== -->
<div class="navbar">
  <div class="date-switcher">
    <button class="date-btn" id="prevDate" title="上一期">◀</button>
    <div class="date-display" id="dateDisplay">2026-04-24</div>
    <button class="date-btn" id="nextDate" title="下一期">▶</button>
  </div>
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" data-cat="all">全部</button>
    <button class="cat-tab" data-cat="0">贴身衣物</button>
    <button class="cat-tab" data-cat="1">女装</button>
    <button class="cat-tab" data-cat="2">男装</button>
    <button class="cat-tab" data-cat="3">箱包鞋靴</button>
    <button class="cat-tab" data-cat="4">珠宝文玩</button>
    <button class="cat-tab" data-cat="5">配饰</button>
    <button class="cat-tab" data-cat="6">运动户外</button>
  </div>
</div>

<!-- ===== CONTENT ===== -->
<div class="container" id="mainContent"></div>

<!-- ===== FOOTER STATISTICS ===== -->
<div class="footer-stats" id="footerStats">
  <div class="stat-item"><div class="stat-num" id="statTotalMerchants">0</div><div class="stat-label">头部商家数</div></div>
  <div class="stat-item"><div class="stat-num" id="statGrowthMerchants">0</div><div class="stat-label">高增速商家</div></div>
  <div class="stat-item"><div class="stat-num" id="statCategories">4</div><div class="stat-label">覆盖类目</div></div>
</div>

<div class="footer-note">
  数据来源：AData BI 周五放榜 · 自动生成 · <a href="https://github.com/quzingdu-create/friday-report" target="_blank" style="color:var(--primary)">GitHub</a>
</div>

<!-- ===== FEEDBACK FAB ===== -->
<button class="feedback-fab" id="feedbackBtn" title="反馈意见">💬</button>

<!-- ===== FEEDBACK MODAL ===== -->
<div class="modal-overlay" id="feedbackModal">
  <div class="modal-box">
    <div class="modal-title">💬 反馈意见</div>
    <div class="modal-desc">您的建议是我们改进的动力，感谢反馈！</div>

    <div class="form-group">
      <label>类型</label>
      <select id="fbType">
        <option value="bug">🐛 问题/错误</option>
        <option value="feature">✨ 功能建议</option>
        <option value="data">📊 数据问题</option>
        <option value="style">🎨 样式/体验</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>联系方式（选填，方便我们回复）</label>
      <input type="text" id="fbContact" placeholder="企微名 / 手机号 / 邮箱">
    </div>
    <div class="form-group">
      <label>详细描述</label>
      <textarea id="fbContent" placeholder="请描述您的问题或建议..."></textarea>
    </div>

    <button class="btn-primary" id="fbSubmit">提交反馈</button>
    <button class="btn-cancel" id="fbCancel">取消</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA STORE — 每期的数据都存在这里，按日期索引
// ============================================================
const REPORTS = {};

// 当前显示的期数和选中的类目
let currentDate = '2026-04-24';
let currentCat = 'all';

// 可用日期列表（从历史数据中动态获取）
const availableDates = [];

// ============================================================
// 渲染函数
// ============================================================

function render() {
  const report = REPORTS[currentDate];
  const container = document.getElementById('mainContent');

  // 更新日期显示
  document.getElementById('dateDisplay').textContent = currentDate;

  // 更新导航按钮状态
  const idx = availableDates.indexOf(currentDate);
  document.getElementById('prevDate').style.opacity = (idx > 0) ? '1' : '.3';
  document.getElementById('nextDate').style.opacity = (idx >= 0 && idx < availableDates.length - 1) ? '1' : '.3';

  if (!report || !report.categories || report.categories.length === 0) {
    container.innerHTML = `<div class="section"><div class="empty-state"><div class="icon">📭</div><p>${currentDate} 暂无数据</p></div></div>`;
    updateFooterStats([]);
    return;
  }

  let html = '';
  let totalMerchants = 0;
  let totalGrowth = 0;

  const catsToShow = currentCat === 'all'
    ? report.categories.map((c, i) => ({ cat: c, idx: i }))
    : report.categories
        .map((c, i) => ({ cat: c, idx: i }))
        .filter(x => x.idx === parseInt(currentCat));

  catsToShow.forEach(({ cat, idx }) => {
    html += `<div class="section">`;

    // 类目标题
    html += `<div class="sub-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>${cat.title}</div>`;

    // 头部商家
    if (cat.merchants && cat.merchants.length > 0) {
      totalMerchants += cat.merchants.length;
      html += `<div class="sub-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>${cat.headTitle || '头部重点商家'}</div>`;
      cat.merchants.forEach((m, mi) => {
        const rcls = mi <= 3 ? `r${mi}` : 'rn';
        // 奖牌：Top1-5 排名标识
        const medals = ['🥇','🥈','🥉'];
        const medal = medals[mi] || '';
        const catsHtml = m.categories && m.categories.length
          ? `<div class="m-cats">主营：${m.categories.map(c => `<span class="tag">${c}</span>`).join('')}</div>`
          : '';
        html += `<div class="m-card ${rcls}">
          <div class="m-info">
            <div class="m-name">${medal} ${m.name}</div>
            ${catsHtml}
          </div>
          <div class="m-gmv">日均GMV ${m.gmv}</div>
        </div>`;
      });
    }

    // 高增速商家
    if (cat.growth && cat.growth.length > 0) {
      totalGrowth += cat.growth.length;
      html += `<div class="sub-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 6l-9.5 9.5-5-5L1 18"/><path d="M17 6h6v6"/></svg>${cat.growthTitle || '本周 GMV 高增速商家'}</div>`;
      cat.growth.forEach(g => {
        const catsHtml = g.categories && g.categories.length
          ? `<div class="m-cats">主营：${g.categories.map(c => `<span class="tag">${c}</span>`).join('')}</div>`
          : '';
        const rateHtml = g.rate ? `<div class="m-rate">📈 ${g.rate}</div>` : '';
        html += `<div class="m-card growth">
          <div class="m-info">
            <div class="m-name">${g.name}</div>
            ${catsHtml}
            ${rateHtml}
          </div>
          <div class="m-gmv g-style">${g.gmv || '-'}</div>
        </div>`;
      });
    }

    html += `</div>`;
  });

  container.innerHTML = html || '<div class="empty-state"><p>该分类暂无数据</p></div>';
  updateFooterStats(report.categories);
}

function updateFooterStats(cats) {
  if (!cats) return;
  let tM = 0, tG = 0;
  cats.forEach(c => { tM += (c.merchants||[]).length; tG += (c.growth||[]).length; });
  document.getElementById('statTotalMerchants').textContent = tM;
  document.getElementById('statGrowthMerchants').textContent = tG;
  document.getElementById('statCategories').textContent = cats.length;
}

// ============================================================
// 事件绑定
// ============================================================

// 日期切换
document.getElementById('prevDate').addEventListener('click', () => {
  const idx = availableDates.indexOf(currentDate);
  if (idx > 0) { currentDate = availableDates[idx - 1]; render(); }
});
document.getElementById('nextDate').addEventListener('click', () => {
  const idx = availableDates.indexOf(currentDate);
  if (idx >= 0 && idx < availableDates.length - 1) { currentDate = availableDates[idx + 1]; render(); }
});

// 类目切换
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    render();
  });
});

// ===== 反馈 Modal =====
const fbModal = document.getElementById('feedbackModal');
const fbBtn = document.getElementById('feedbackBtn');
const toast = document.getElementById('toast');

fbBtn.addEventListener('click', () => fbModal.classList.add('show'));
document.getElementById('fbCancel').addEventListener('click', () => fbModal.classList.remove('show'));
fbModal.addEventListener('click', e => { if (e.target === fbModal) fbModal.classList.remove('show'); });

function showToast(msg) {
  toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

document.getElementById('fbSubmit').addEventListener('click', () => {
  const type = document.getElementById('fbType').value;
  const contact = document.getElementById('fbContact').value.trim();
  const content = document.getElementById('fbContent').value.trim();

  if (!content) { showToast('⚠️ 请填写反馈内容'); return; }

  // 存储到 localStorage（实际项目可对接后端 API）
  const feedbacks = JSON.parse(localStorage.getItem('_fr_feedbacks') || '[]');
  feedbacks.push({ date: new Date().toISOString(), type, contact, content, pageDate: currentDate });
  localStorage.setItem('_fr_feedbacks', JSON.stringify(feedbacks));

  // 清空表单
  document.getElementById('fbContent').value = '';
  document.getElementById('fbContact').value = '';

  fbModal.classList.remove('show');
  showToast('✅ 反馈已收到，感谢您的建议！');
});

// ===== 浏览记录 =====
function updateVisitCount() {
  try {
    // localStorage 本地计数
    let visits = parseInt(localStorage.getItem('_fr_visits') || '0') + 1;
    localStorage.setItem('_fr_visits', String(visits));
    document.getElementById('visitCount').textContent = visits.toLocaleString();

    // 记录访问日志
    const logs = JSON.parse(localStorage.getItem('_fr_visitLogs') || '[]');
    logs.push({ date: new Date().toISOString(), page: location.href, ua: navigator.userAgent.slice(0,80) });
    // 只保留最近 500 条
    if (logs.length > 500) logs.splice(0, logs.length - 500);
    localStorage.setItem('_fr_visitLogs', JSON.stringify(logs));

    // 更新最后更新时间
